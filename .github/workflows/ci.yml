name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_STELLAR_NETWORK: testnet
  NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
  NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Unit tests (node:test)
        run: npm run test:unit
      - name: Component tests (Vitest)
        run: npm run test:components

  build:
    name: Build & Bundle Budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Check bundle size budgets
        run: npm run size
