<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>You're offline — PayEasy</title>
    <meta
      name="description"
      content="PayEasy is offline. Blockchain features require a connection."
    />
    <meta name="theme-color" content="#07070a" />
    <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: #07070a;
        color: #f5f5f5;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Inter,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(
            circle at 50% 0%,
            rgba(92, 124, 250, 0.18),
            transparent 55%
          ),
          radial-gradient(
            circle at 80% 100%,
            rgba(32, 201, 151, 0.12),
            transparent 60%
          ),
          #07070a;
      }
      main {
        max-width: 440px;
        width: 100%;
        text-align: center;
        padding: 40px 28px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.05);
        color: #b5c0d6;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 20px;
      }
      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(92, 124, 250, 0.14);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #9aa9ff;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 24px;
        font-size: 15px;
        line-height: 1.6;
        color: #a0a4af;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }
      button,
      a.button {
        appearance: none;
        border: none;
        cursor: pointer;
        padding: 12px 20px;
        border-radius: 14px;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-decoration: none;
        transition:
          transform 0.15s ease,
          background-color 0.15s ease;
      }
      .primary {
        background: #5c7cfa;
        color: #fff;
      }
      .primary:hover {
        background: #6c8aff;
      }
      .secondary {
        background: rgba(255, 255, 255, 0.06);
        color: #f5f5f5;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .secondary:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .status {
        margin-top: 18px;
        font-size: 11px;
        color: #6c7282;
      }
    </style>
  </head>
  <body>
    <main role="main" aria-labelledby="offline-title">
      <span class="badge">Connection lost</span>
      <div class="icon" aria-hidden="true">
        <svg
          width="28"
          height="28"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="1" y1="1" x2="23" y2="23"></line>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>
      <h1 id="offline-title">You're offline</h1>
      <p>
        Blockchain features require a connection. PayEasy will keep your last
        viewed pages cached so you can browse what you have already loaded.
      </p>
      <div class="actions">
        <button class="primary" type="button" onclick="window.location.reload()">
          Try again
        </button>
        <a class="button secondary" href="/">Open home</a>
      </div>
      <p class="status" id="status" aria-live="polite">
        We will retry automatically when you come back online.
      </p>
    </main>
    <script>
      (function () {
        if (typeof window === "undefined") return;
        var status = document.getElementById("status");
        function setStatus(text) {
          if (status) status.textContent = text;
        }
        window.addEventListener("online", function () {
          setStatus("Connection restored — reloading…");
          window.location.reload();
        });
        window.addEventListener("offline", function () {
          setStatus("Still offline. We will retry automatically.");
        });
      })();
    </script>
  </body>
</html>
